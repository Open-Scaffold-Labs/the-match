<!doctype html><html><head><style>html,body{margin:0;padding:0;background:transparent}body{display:flex;align-items:center;justify-content:center;width:1024px;height:1024px}svg{display:block;width:1024px;height:1024px}</style></head><body>
<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="paper" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F4E5B0"/><stop offset="55%" stop-color="#E8D49A"/><stop offset="100%" stop-color="#D4BC78"/></linearGradient>
<radialGradient id="warm" cx="0.5" cy="0.55" r="0.65"><stop offset="0%" stop-color="#FFE9A8" stop-opacity="0.45"/><stop offset="100%" stop-color="#D4BC78" stop-opacity="0"/></radialGradient>
<linearGradient id="gold" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F4D582"/><stop offset="28%" stop-color="#E5BA52"/><stop offset="55%" stop-color="#C99828"/><stop offset="80%" stop-color="#9A7212"/><stop offset="100%" stop-color="#5C4108"/></linearGradient>
<linearGradient id="goldHead" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F4D582"/><stop offset="50%" stop-color="#C99828"/><stop offset="100%" stop-color="#5C4108"/></linearGradient>
<linearGradient id="mShine" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F8DC8E"/><stop offset="35%" stop-color="#E0B040"/><stop offset="65%" stop-color="#A87822"/><stop offset="100%" stop-color="#5C4108"/></linearGradient>
<linearGradient id="grip" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3A2A05"/><stop offset="100%" stop-color="#1F1602"/></linearGradient>
</defs>
<rect width="1024" height="1024" fill="url(#paper)"/>
<rect width="1024" height="1024" fill="url(#warm)"/>

<!-- TOP CLUB: head LEFT, hangs DOWN. BIG iron blade (100x50), thick shaft, distinct grip. -->
<g>
  <!-- Iron blade head: heel-thick, toe-tapered, pronounced sole curve -->
  <path d="M 230 130
           L 230 188
           Q 195 213 145 210
           Q 110 207 108 188
           L 115 152
           Q 145 130 230 130 Z"
        fill="url(#goldHead)" stroke="#3A2A05" stroke-width="3" stroke-linejoin="round"/>
  <!-- Hosel: bold connector heel-top → shaft -->
  <path d="M 230 124 L 256 122 L 260 142 L 230 145 Z" fill="url(#gold)" stroke="#3A2A05" stroke-width="1.5"/>
  <!-- Shaft: thick (10px), shorter so the head is proportionally significant -->
  <path d="M 256 128 L 770 134 L 770 142 L 256 142 Z" fill="url(#gold)"/>
  <!-- Grip: longer (95px), distinct leather wrap -->
  <rect x="770" y="120" width="100" height="28" rx="6" fill="url(#grip)"/>
  <line x1="782" y1="127" x2="858" y2="127" stroke="#5C4108" stroke-width="0.9" opacity="0.50"/>
  <line x1="782" y1="134" x2="858" y2="134" stroke="#5C4108" stroke-width="0.9" opacity="0.50"/>
  <line x1="782" y1="141" x2="858" y2="141" stroke="#5C4108" stroke-width="0.9" opacity="0.50"/>
  <circle cx="884" cy="134" r="7" fill="#3A2A05"/>
</g>

<!-- BOTTOM CLUB: 180° rotation around canvas center. Head RIGHT, points UP. -->
<g transform="rotate(180 512 512)">
  <path d="M 230 130 L 230 188 Q 195 213 145 210 Q 110 207 108 188 L 115 152 Q 145 130 230 130 Z"
        fill="url(#goldHead)" stroke="#3A2A05" stroke-width="3" stroke-linejoin="round"/>
  <path d="M 230 124 L 256 122 L 260 142 L 230 145 Z" fill="url(#gold)" stroke="#3A2A05" stroke-width="1.5"/>
  <path d="M 256 128 L 770 134 L 770 142 L 256 142 Z" fill="url(#gold)"/>
  <rect x="770" y="120" width="100" height="28" rx="6" fill="url(#grip)"/>
  <line x1="782" y1="127" x2="858" y2="127" stroke="#5C4108" stroke-width="0.9" opacity="0.50"/>
  <line x1="782" y1="134" x2="858" y2="134" stroke="#5C4108" stroke-width="0.9" opacity="0.50"/>
  <line x1="782" y1="141" x2="858" y2="141" stroke="#5C4108" stroke-width="0.9" opacity="0.50"/>
  <circle cx="884" cy="134" r="7" fill="#3A2A05"/>
</g>

<!-- EST · 2026 — positioned BELOW the top club (clear gap), still tight enough to M -->
<text x="512" y="262" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="500" font-style="italic" font-size="44" fill="#5C4108" style="letter-spacing: 18px;">EST · 2026</text>

<!-- THE MATCH — positioned ABOVE the bottom club (clear gap) -->
<text x="512" y="894" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-style="italic" font-size="58" fill="#5C4108" style="letter-spacing: 12px;">THE MATCH</text>

<!-- M — same as v10 -->
<text x="512" y="751" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="780" fill="#3A2A05" opacity="0.40" style="letter-spacing: -28px;">M</text>
<text x="512" y="745" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="780" fill="url(#mShine)" style="letter-spacing: -28px;">M</text>
<text x="512" y="745" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="780" fill="none" stroke="#3A2A05" stroke-width="2.5" opacity="0.55" style="letter-spacing: -28px;">M</text>
</svg>
</body></html>
