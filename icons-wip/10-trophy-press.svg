<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4E5B0"/>
      <stop offset="55%" stop-color="#E8D49A"/>
      <stop offset="100%" stop-color="#D4BC78"/>
    </linearGradient>
    <radialGradient id="warm" cx="0.5" cy="0.55" r="0.65">
      <stop offset="0%" stop-color="#FFE9A8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#D4BC78" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F4D582"/>
      <stop offset="28%"  stop-color="#E5BA52"/>
      <stop offset="55%"  stop-color="#C99828"/>
      <stop offset="80%"  stop-color="#9A7212"/>
      <stop offset="100%" stop-color="#5C4108"/>
    </linearGradient>
    <linearGradient id="goldHead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F4D582"/>
      <stop offset="50%"  stop-color="#C99828"/>
      <stop offset="100%" stop-color="#5C4108"/>
    </linearGradient>
    <linearGradient id="mShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F8DC8E"/>
      <stop offset="35%"  stop-color="#E0B040"/>
      <stop offset="65%"  stop-color="#A87822"/>
      <stop offset="100%" stop-color="#5C4108"/>
    </linearGradient>
    <linearGradient id="grip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A2A05"/>
      <stop offset="100%" stop-color="#1F1602"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#paper)"/>
  <rect width="1024" height="1024" fill="url(#warm)"/>

  <!-- TOP CLUB — head on LEFT (hangs DOWN below shaft, curved sole), grip on RIGHT -->
  <g>
    <!-- Iron blade head: hangs down from heel, sole curves toward toe -->
    <path d="M 188 162
             L 188 198
             Q 168 218 138 208
             L 138 174
             L 188 162 Z"
          fill="url(#goldHead)" stroke="#3A2A05" stroke-width="1.6" stroke-linejoin="round"/>
    <!-- Face groove suggestion (3 thin lines) -->
    <line x1="148" y1="184" x2="180" y2="178" stroke="#3A2A05" stroke-width="0.8" opacity="0.55"/>
    <line x1="148" y1="192" x2="180" y2="186" stroke="#3A2A05" stroke-width="0.8" opacity="0.55"/>
    <line x1="150" y1="200" x2="180" y2="194" stroke="#3A2A05" stroke-width="0.8" opacity="0.55"/>
    <!-- Hosel: small angled connector heel → shaft -->
    <path d="M 188 162 L 200 158 L 204 168 L 188 172 Z" fill="url(#gold)" stroke="#3A2A05" stroke-width="1"/>
    <!-- Shaft: tapered (thicker near hosel, thinner near grip) -->
    <path d="M 200 159 L 800 162 L 800 167 L 200 168 Z" fill="url(#gold)"/>
    <!-- Shaft highlight (thin top stroke) -->
    <line x1="206" y1="160.5" x2="800" y2="163" stroke="#FFEBB8" stroke-width="1" opacity="0.55"/>
    <!-- Grip wrap (leather, darker, knurled) -->
    <rect x="800" y="153" width="78" height="20" rx="4" fill="url(#grip)"/>
    <!-- Grip knurl lines -->
    <line x1="810" y1="158" x2="868" y2="158" stroke="#5C4108" stroke-width="0.6" opacity="0.45"/>
    <line x1="810" y1="163" x2="868" y2="163" stroke="#5C4108" stroke-width="0.6" opacity="0.45"/>
    <line x1="810" y1="168" x2="868" y2="168" stroke="#5C4108" stroke-width="0.6" opacity="0.45"/>
    <!-- Grip cap end -->
    <circle cx="878" cy="163" r="5" fill="#3A2A05"/>
  </g>

  <!-- BOTTOM CLUB — mirror: grip LEFT, shaft, head on RIGHT (hangs DOWN, sole curves toward toe-right) -->
  <g>
    <circle cx="146" cy="861" r="5" fill="#3A2A05"/>
    <rect x="146" y="851" width="78" height="20" rx="4" fill="url(#grip)"/>
    <line x1="156" y1="856" x2="214" y2="856" stroke="#5C4108" stroke-width="0.6" opacity="0.45"/>
    <line x1="156" y1="861" x2="214" y2="861" stroke="#5C4108" stroke-width="0.6" opacity="0.45"/>
    <line x1="156" y1="866" x2="214" y2="866" stroke="#5C4108" stroke-width="0.6" opacity="0.45"/>
    <path d="M 224 857 L 824 860 L 824 865 L 224 866 Z" fill="url(#gold)"/>
    <line x1="224" y1="858.5" x2="818" y2="861" stroke="#FFEBB8" stroke-width="1" opacity="0.55"/>
    <path d="M 836 860 L 820 856 L 824 866 L 836 870 Z" fill="url(#gold)" stroke="#3A2A05" stroke-width="1"/>
    <path d="M 836 860
             L 836 896
             Q 856 916 886 906
             L 886 872
             L 836 860 Z"
          fill="url(#goldHead)" stroke="#3A2A05" stroke-width="1.6" stroke-linejoin="round"/>
    <line x1="844" y1="882" x2="876" y2="876" stroke="#3A2A05" stroke-width="0.8" opacity="0.55"/>
    <line x1="844" y1="890" x2="876" y2="884" stroke="#3A2A05" stroke-width="0.8" opacity="0.55"/>
    <line x1="846" y1="898" x2="876" y2="892" stroke="#3A2A05" stroke-width="0.8" opacity="0.55"/>
  </g>

  <!-- EST · 2026 italic Georgia under top club (with breathing room from the head) -->
  <text x="512" y="290" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="400" font-style="italic" font-size="40" fill="#5C4108" style="letter-spacing: 18px;">EST · 2026</text>

  <!-- THE MATCH italic Georgia above bottom club -->
  <text x="512" y="800" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-style="italic" font-size="58" fill="#5C4108" style="letter-spacing: 12px;">THE MATCH</text>

  <!-- The M — center, deep gold, with enough breathing room above and below -->
  <text x="512" y="690" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="540" fill="#3A2A05" opacity="0.40" style="letter-spacing: -22px;">M</text>
  <text x="512" y="684" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="540" fill="url(#mShine)" style="letter-spacing: -22px;">M</text>
  <text x="512" y="684" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="540" fill="none" stroke="#3A2A05" stroke-width="2.2" opacity="0.55" style="letter-spacing: -22px;">M</text>
</svg>
