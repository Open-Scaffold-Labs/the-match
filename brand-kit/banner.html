<!doctype html><html><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:816px;height:308px;}
  body{font-family:"Helvetica Neue",Arial,sans-serif;
    background:radial-gradient(130% 160% at 50% 0%, #F0E3B8 0%,#E2CD92 38%,#D0B265 70%,#C0A04E 100%);
    position:relative;overflow:hidden;}
  .arc{position:absolute;left:-15%;right:-15%;bottom:-160%;height:200%;border-radius:50%;border:1px solid rgba(120,95,35,.22);}
  .pad{position:absolute;inset:40px 56px;}
  .top{display:flex;justify-content:space-between;align-items:center;}
  .eb{font-size:12px;font-weight:700;letter-spacing:4px;color:#5E5224;text-transform:uppercase;}
  .ebr{font-size:11px;font-weight:700;letter-spacing:3px;color:#6E5A26;text-transform:uppercase;}
  .wm{font-family:"Didot",Georgia,serif;line-height:.9;margin-top:18px;}
  .wm .the{font-size:42px;color:#8A7434;}
  .wm .match{font-size:78px;font-weight:700;background:linear-gradient(180deg,#FBF1CE 0%,#E7C878 40%,#C49A3C 74%,#9C7A2A 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 2px 1px rgba(90,66,20,.22));}
  .sub{font-family:"Didot",Georgia,serif;font-style:italic;font-size:20px;color:#173E29;margin-top:10px;}
  .rule{position:absolute;left:56px;right:56px;bottom:34px;height:1px;background:rgba(110,86,28,.5);}
</style></head><body>
  <div class="arc"></div>
  <div class="pad">
    <div class="top"><div class="eb">SOCIAL MEDIA MARKETING PLAN</div><div class="ebr">GOLFNOW AFFILIATE PROGRAM &middot; 2026</div></div>
    <div class="wm"><span class="the">The</span> <span class="match">Match</span></div>
    <div class="sub">Turning every round into shareable content.</div>
    <div class="rule"></div>
  </div>
</body></html>
