# The Match — native shell + Apple Watch app (Phase W0).
# (wiki: The-Match-AppleWatch-Strategy.docx · generated with XcodeGen)
#
#   cd ios && xcodegen generate
#   DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer \
#     xcodebuild -project TheMatch.xcodeproj -scheme TheMatchWatch \
#     -destination 'generic/platform=watchOS Simulator' CODE_SIGNING_ALLOWED=NO build
#
# Signing is intentionally unset (simulator-only until Dale's Apple Developer
# enrollment). For TestFlight: set DEVELOPMENT_TEAM + automatic signing in Xcode.

name: TheMatch
options:
  bundleIdPrefix: com.openscaffoldlabs
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
    # Open Scaffold Labs LLC (dale@openscaffoldlabs.com) — signed in 2026-07-17.
    DEVELOPMENT_TEAM: 8P96A2SK8X
    CODE_SIGN_STYLE: Automatic

targets:
  # ── iOS shell: WKWebView around the production PWA + (W4) App Intents ──────
  TheMatch:
    type: application
    platform: iOS
    sources: [TheMatch]
    dependencies:
      - target: TheMatchWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openscaffoldlabs.thematch
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: TheMatch/Info.plist
      properties:
        CFBundleDisplayName: The Match
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSMicrophoneUsageDescription: "The Match uses the microphone for voice score entry and talking with the caddie."
        NSLocationWhenInUseUsageDescription: "Your location powers GPS distances, hole detection, and shot tracking."
        NSAppTransportSecurity: { NSAllowsArbitraryLoads: false }

  # ── watchOS app: native SwiftUI, standalone-capable (talks to /api/v1) ─────
  TheMatchWatch:
    type: application
    platform: watchOS
    sources: [TheMatchWatch]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openscaffoldlabs.thematch.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: TheMatchWatch/Info.plist
      properties:
        CFBundleDisplayName: The Match
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.openscaffoldlabs.thematch
        WKRunsIndependentlyOfCompanionApp: true
        NSLocationWhenInUseUsageDescription: "Distances to the green come from your location."
